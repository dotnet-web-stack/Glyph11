name: Package Native

# Builds libglyph11 for every supported RID, bundles them into the Glyph11.Native
# NuGet (runtimes/<rid>/native/), and — only on a `native-v*` tag or an explicit
# dispatch — pushes to NuGet.org. PRs touching the core/binding build + pack as a
# smoke test (artifact only, never published).
on:
  workflow_dispatch:
    inputs:
      publish:
        description: Push the packed NuGet to NuGet.org
        type: boolean
        default: false
  workflow_call:        # called by release.yml to publish alongside the other packages
    inputs:
      publish:
        type: boolean
        default: false
  push:
    tags:
      - 'native-v*'
  pull_request:
    paths:
      - 'core/**'
      - 'bindings/dotnet/**'
      - '.github/workflows/package-native.yml'

permissions:
  contents: read

jobs:

  build:
    name: native ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-latest
            # AVX2 microarch level: the 256-bit scanners inline (~15% faster on large
            # headers). Requires a 2013+ (Haswell) CPU — fine for modern linux-x64.
            cmake: -DGLYPH11_X86_AVX2=ON
          - rid: linux-arm64
            runner: ubuntu-latest
            apt: gcc-aarch64-linux-gnu
            cmake: -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
          - rid: win-x64
            runner: windows-latest
            cmake: -A x64
          - rid: win-arm64
            runner: windows-latest
            cmake: -A ARM64
          - rid: osx-x64
            runner: macos-14
            cmake: -DCMAKE_OSX_ARCHITECTURES=x86_64
          - rid: osx-arm64
            runner: macos-14
            cmake: -DCMAKE_OSX_ARCHITECTURES=arm64
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install cross toolchain
        if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: Configure
        run: cmake -S core -B core/build-pkg -DCMAKE_BUILD_TYPE=Release -DGLYPH11_BUILD_TESTS=OFF ${{ matrix.cmake }}

      - name: Build
        run: cmake --build core/build-pkg --config Release --target glyph11_shared

      - name: Stage (cmake --install -> stage/<rid>/native/<lib>)
        run: cmake --install core/build-pkg --config Release --prefix stage/${{ matrix.rid }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          # `path: stage` keeps artifact paths relative to stage/, i.e. <rid>/native/<lib>,
          # so the pack job can merge all six straight into runtimes/.
          path: stage
          if-no-files-found: error

  pack:
    name: Pack Glyph11.Native
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: |
            8.0
            9.0
            10.0

      - name: Gather native binaries -> runtimes/
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          merge-multiple: true
          path: bindings/dotnet/Glyph11.Native/runtimes

      - name: Show staged runtimes
        run: find bindings/dotnet/Glyph11.Native/runtimes -type f | sort

      - name: Resolve package version
        id: ver
        # tag native-vX.Y.Z -> X.Y.Z; publish (dispatch/release call) -> the csproj <Version>;
        # PR smoke test -> a throwaway CI prerelease.
        run: |
          ref='${{ github.ref }}'
          if [[ "$ref" == refs/tags/native-v* ]]; then
            echo "args=-p:Version=${ref#refs/tags/native-v}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ inputs.publish }}" == "true" ]]; then
            echo "args=" >> "$GITHUB_OUTPUT"
          else
            echo "args=-p:Version=0.0.0-ci.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        run: >
          dotnet pack bindings/dotnet/Glyph11.Native/Glyph11.Native.csproj
          -c Release -p:ContinuousIntegrationBuild=true
          ${{ steps.ver.outputs.args }}
          -o artifacts

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: Glyph11.Native-nupkg
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error

  publish:
    name: Publish to NuGet.org
    needs: pack
    # Only on a native-v* tag, or an explicit dispatch with publish=true.
    if: startsWith(github.ref, 'refs/tags/native-v') || ((github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && inputs.publish)
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0'

      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: Glyph11.Native-nupkg
          path: artifacts

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "artifacts/*.nupkg" -k "$NUGET_API_KEY" -s https://api.nuget.org/v3/index.json --skip-duplicate
