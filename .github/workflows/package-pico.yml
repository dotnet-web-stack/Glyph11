name: Package Pico

# Builds libglyph11pico (picohttpparser + shim) for every supported RID, bundles them
# into the Glyph11.Pico NuGet (runtimes/<rid>/native/), and — only on a `pico-v*` tag or
# an explicit dispatch — pushes to NuGet.org. PRs touching the package build + pack as a
# smoke test (artifact only, never published).
on:
  workflow_dispatch:
    inputs:
      publish:
        description: Push the packed NuGet to NuGet.org
        type: boolean
        default: false
  push:
    tags:
      - 'pico-v*'
  pull_request:
    paths:
      - 'bindings/dotnet/Glyph11.Pico/**'
      - '.github/workflows/package-pico.yml'

permissions:
  contents: read

env:
  NATIVE_DIR: bindings/dotnet/Glyph11.Pico/native

jobs:

  build:
    name: pico ${{ matrix.rid }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-latest
            # SSE4.2 for picohttpparser's findchar_fast (via -march=x86-64-v3, Haswell+).
            cmake: -DGLYPH11_PICO_X86_AVX2=ON
          - rid: linux-arm64
            runner: ubuntu-latest
            apt: gcc-aarch64-linux-gnu
            cmake: -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
          - rid: win-x64
            runner: windows-latest
            cmake: -A x64
          - rid: win-arm64
            runner: windows-latest
            cmake: -A ARM64
          - rid: osx-x64
            runner: macos-14
            cmake: -DCMAKE_OSX_ARCHITECTURES=x86_64 -DGLYPH11_PICO_X86_AVX2=ON
          - rid: osx-arm64
            runner: macos-14
            cmake: -DCMAKE_OSX_ARCHITECTURES=arm64
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install cross toolchain
        if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: Configure
        run: cmake -S "$NATIVE_DIR" -B "$NATIVE_DIR/build-pkg" -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake }}
        shell: bash

      - name: Build
        run: cmake --build "$NATIVE_DIR/build-pkg" --config Release --target glyph11pico
        shell: bash

      - name: Stage (cmake --install -> stage/<rid>/native/<lib>)
        run: cmake --install "$NATIVE_DIR/build-pkg" --config Release --prefix stage/${{ matrix.rid }}
        shell: bash

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: pico-${{ matrix.rid }}
          path: stage
          if-no-files-found: error

  pack:
    name: Pack Glyph11.Pico
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: |
            8.0
            9.0
            10.0

      - name: Gather native binaries -> runtimes/
        uses: actions/download-artifact@v4
        with:
          pattern: pico-*
          merge-multiple: true
          path: bindings/dotnet/Glyph11.Pico/runtimes

      - name: Show staged runtimes
        run: find bindings/dotnet/Glyph11.Pico/runtimes -type f | sort

      - name: Resolve package version
        id: ver
        # pico-vX.Y.Z tag -> X.Y.Z (a release); otherwise a CI prerelease.
        run: |
          ref='${{ github.ref }}'
          if [[ "$ref" == refs/tags/pico-v* ]]; then
            echo "version=${ref#refs/tags/pico-v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.1-ci.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack
        run: >
          dotnet pack bindings/dotnet/Glyph11.Pico/Glyph11.Pico.csproj
          -c Release -p:ContinuousIntegrationBuild=true
          -p:Version=${{ steps.ver.outputs.version }}
          -o artifacts

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: Glyph11.Pico-nupkg
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error

  publish:
    name: Publish to NuGet.org
    needs: pack
    # Only on a pico-v* tag, or an explicit dispatch with publish=true.
    if: startsWith(github.ref, 'refs/tags/pico-v') || (github.event_name == 'workflow_dispatch' && inputs.publish)
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0'

      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: Glyph11.Pico-nupkg
          path: artifacts

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "artifacts/*.nupkg" -k "$NUGET_API_KEY" -s https://api.nuget.org/v3/index.json --skip-duplicate
