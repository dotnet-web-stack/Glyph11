name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.22'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@75d2e84710de30f6ff7268e08f310b60ef14033f # v3
        with:
          hugo-version: '0.162.1'
          extended: true

      - name: Fetch benchmark data from gh-pages
        run: |
          git fetch origin gh-pages
          mkdir -p docs/static/benchmarks
          git show origin/gh-pages:benchmarks/data.js > docs/static/benchmarks/data.js 2>/dev/null || true
          git show origin/gh-pages:benchmarks/cross-lang.json > docs/static/benchmarks/cross-lang.json 2>/dev/null || true
          mkdir -p docs/static/bench
          git show origin/gh-pages:benchmarks/cross-lang.json > docs/static/bench/data.json 2>/dev/null || true

      - name: Build
        run: hugo --minify --source docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
